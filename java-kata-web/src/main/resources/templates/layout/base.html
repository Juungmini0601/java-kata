<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!-- Fragment head -->
<head th:fragment="head(title, links)">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${title}">Java Kata</title>

  <!-- Pretendard 폰트 CDN -->
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <!-- Reset CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reset-css@5.0.2/reset.min.css">
  <!-- BootStrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- 전역 CSS -->
  <link rel="stylesheet" href="/css/global.css">

  <!-- 추가 CSS를 위한 블록 -->
  <th:block th:replace="${links}"/>

</head>

<!-- TODO Header 추가 예정 -->
<header th:fragment="header" class="header">

  <div class="logo-box">
    <img src="/images/favicon.svg" alt="로고">
    <h1>
      <a href="/">Java Kata</a>
    </h1>
  </div>

  <div class="right-menu">
    <a href="/">로그인</a>
    <a href="/signup">회원가입</a>
  </div>

</header>

<footer th:fragment="footer" class="footer mt-auto py-3">
  <div class="container text-center">
    <div class="row">
      <p class="mb-0 text-light">
        <span>&copy; </span>
        <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}">2024</span>
        <span> Java Kata. All rights reserved.</span>
      </p>
    </div>
  </div>
</footer>

<th:block th:fragment="script">
  <!-- BootStrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>
</th:block>
</html>
